name: Build PSC Quiz APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build-apk:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      - uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v2
      - run: npm install
      - run: npm run build
      - run: |
          npm install @capacitor/core @capacitor/android @capacitor/cli
          npx cap add android || true
          npx cap sync android
      - name: Update targetSdkVersion
        run: |
          sed -i 's/targetSdkVersion .*/targetSdkVersion 34/' android/app/build.gradle
          sed -i 's/compileSdkVersion .*/compileSdkVersion 34/' android/app/build.gradle
          sed -i 's/minSdkVersion .*/minSdkVersion 24/' android/app/build.gradle
      - run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: PSC-Quiz-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
